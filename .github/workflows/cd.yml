name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded (skip on failure/cancellation)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/weepingdogel/my_services/matrix-historian

            # Pull latest code (for docker-compose.yml updates)
            git pull origin main

            # Pull new images from Docker Hub
            docker compose -f docker-compose.production.yml pull bot api web

            # Start all services (ensures db and minio are running)
            docker compose -f docker-compose.production.yml up -d

            # Wait and check health
            echo "Waiting for services to start..."
            sleep 15

            echo "Service status:"
            docker compose -f docker-compose.production.yml ps
