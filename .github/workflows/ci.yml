name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy bandit ruff pre-commit
        
    - name: Run black (code formatting)
      run: |
        black --check --diff .
        
    - name: Run isort (import sorting)
      run: |
        isort --check-only --diff .
        
    - name: Run flake8 (code style)
      run: |
        flake8 .
        
    # - name: Run mypy (type checking)
    #   run: |
    #     mypy .
        
    - name: Run bandit (security scanning)
      run: |
        bandit -r services shared --skip B101,B104,B105,B605,B607
        
    - name: Run ruff (additional linting)
      run: |
        ruff check .
        
    - name: Run pre-commit
      run: |
        pre-commit run --all-files
        
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      minio:
        image: minio/minio
        env:
          MINIO_ROOT_USER: test
          MINIO_ROOT_PASSWORD: test123
        options: >-
          --health-cmd "mc ready local"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 3
          --command "server /data --console-address ':9001'"
        ports:
          - 9000:9000
          - 9001:9001
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        
    - name: Install dependencies
      run: |
        uv pip install pytest pytest-cov pytest-asyncio
        uv pip install -e ./shared
        uv pip install -r ./services/api/requirements.txt
        uv pip install -r ./services/bot/requirements.txt
        
    - name: Wait for services
      run: |
        sleep 10  # Give services time to start
        
    - name: Run tests with coverage
      env:
        DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        MINIO_ENDPOINT: localhost:9000
        MINIO_ROOT_USER: test
        MINIO_ROOT_PASSWORD: test123
        MINIO_BUCKET: test-bucket
      run: |
        pytest tests/ -v --cov=shared --cov=services --cov-report=xml --cov-report=html
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push shared package
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./shared/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/shared:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build and push API service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/api/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build and push Bot service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/bot/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/bot:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/bot:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build and push Web service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/web/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to staging
      id: deploy
      run: |
        echo "Deploying to staging environment..."
        # Add your deployment logic here
        # Example: kubectl apply, docker-compose up, etc.
        echo "url=https://staging.matrix-historian.example.com" >> $GITHUB_OUTPUT
        
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: ${{ steps.deploy-prod.outputs.url }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to production
      id: deploy-prod
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment logic here
        # This should include database migrations, health checks, etc.
        echo "url=https://matrix-historian.example.com" >> $GITHUB_OUTPUT