name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy bandit ruff pre-commit

    - name: Run black (code formatting)
      run: |
        black --check --diff .

    - name: Run isort (import sorting)
      run: |
        isort --check-only --diff .

    - name: Run flake8 (code style)
      run: |
        flake8 .

    # - name: Run mypy (type checking)
    #   run: |
    #     mypy .

    - name: Run bandit (security scanning)
      run: |
        bandit -r services shared --skip B101,B104,B105,B605,B607

    - name: Run ruff (additional linting)
      run: |
        ruff check .

    - name: Run pre-commit
      run: |
        pre-commit run --all-files

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-format

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio
        pip install -e ./shared
        pip install -r ./services/api/requirements.txt
        pip install -r ./services/bot/requirements.txt

    - name: Start MinIO
      run: |
        docker run -d --name minio -p 9000:9000 -p 9001:9001 \
          -e MINIO_ROOT_USER=test -e MINIO_ROOT_PASSWORD=test123 \
          minio/minio server /data --console-address ":9001"
        # Wait for MinIO to be healthy
        for i in $(seq 1 30); do
          if curl -sf http://localhost:9000/minio/health/live; then
            echo "MinIO is ready"
            break
          fi
          echo "Waiting for MinIO... ($i/30)"
          sleep 2
        done

    - name: Run tests with coverage
      env:
        DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        MINIO_ENDPOINT: localhost:9000
        MINIO_ROOT_USER: test
        MINIO_ROOT_PASSWORD: test123
        MINIO_BUCKET: test-bucket
      run: |
        pytest tests/ -v --cov=shared --cov=services --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Login to GHCR
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Login to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push API service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/api/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/matrix-historian-api:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/matrix-historian-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Bot service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/bot/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/bot:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/bot:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/matrix-historian-bot:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/matrix-historian-bot:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Web service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/web/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/matrix-historian-web:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/matrix-historian-web:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
