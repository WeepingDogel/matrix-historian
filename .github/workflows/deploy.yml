name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/matrix-historian

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    # Only run after CI passes (ci.yml must succeed on main)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/api/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}-api:latest
            ${{ env.DOCKERHUB_REPO }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/bot/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}-bot:latest
            ${{ env.DOCKERHUB_REPO }}-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/web/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}-web:latest
            ${{ env.DOCKERHUB_REPO }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/weepingdogel/my_services/matrix-historian

            # Pull latest code (for docker-compose.yml updates)
            git pull origin main

            # Pull new images
            docker-compose -f docker-compose.production.yml pull bot api web

            # Restart services with new images
            docker-compose -f docker-compose.production.yml up -d --no-deps bot api web

            # Wait and check health
            echo "Waiting for services to start..."
            sleep 15

            echo "Service status:"
            docker-compose -f docker-compose.production.yml ps
